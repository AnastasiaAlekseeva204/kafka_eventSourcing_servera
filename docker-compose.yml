services:
  auth:
    build: ./auth
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ENGINE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@auth_db:5432/authdb
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      auth_db:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  auth_db:
    image: postgres
    restart: unless-stopped
    shm_size: 128mb
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=authdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  students:
    build: ./students
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ENGINE_URL=postgresql://postgres:${POSTGRES_PASSWORD_STUDENTS}@students_db:5432/studentsdb
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      students_db:
        condition: service_healthy
      kafka:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  students_db:
    image: postgres
    restart: unless-stopped
    shm_size: 128mb
    volumes:
      - postgres_data_students:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_STUDENTS}
      - POSTGRES_DB=studentsdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d studentsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  caddy:
    build: ./caddy
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      auth:
        condition: service_healthy
      students:
        condition: service_healthy

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Настройки для стабильности группы логгера
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CREATE_TOPICS: "student_es_events:1:1,student_events:1:1"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    restart: unless-stopped

  event_processor:
    build: ./event
    restart: unless-stopped
    ports:
      - "8090:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ENGINE_URL=postgresql://postgres:${POSTGRES_PASSWORD_ES}@es_db:5432/esdb
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
      - es_db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  es_db:
    image: postgres
    restart: unless-stopped
    shm_size: 128mb
    volumes:
      - postgres_data_es:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_ES}
      - POSTGRES_DB=esdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d esdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  logger_consumer:
    build: ./consumer/logger
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./logs/students_history.log:/app/students_history.log
  
  academy-api:
    build:
      context: .  # Теперь Docker видит весь корень репозитория
      dockerfile: ./academy-service/Dockerfile
    container_name: academy-api
    # Указываем переменную, чтобы Python искал модули и в /app, и в /app/structure
    environment:
      - PYTHONPATH=/app
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ENGINE_URL=postgresql://postgres:${POSTGRES_PASSWORD_ACADEMY}@academy_db:5432/academydb
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8081:8000"
    depends_on:
      academy_db:
        condition: service_healthy
      kafka:
        condition: service_started

  academy_db:
    image: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD_ACADEMY}
      - POSTGRES_DB=academydb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d academydb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
volumes:
  postgres_data:
  postgres_data_students:
  postgres_data_es:
  postgres_data_academy: